services:
  resend-rapper:
    build: .
    image: resend-rapper:local
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_PATH: /data/resend_rapper.sqlite
      # MASTER_KEY and SESSION_SECRET MUST be set in .env
      # The container refuses to start without them.
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required (see .env.example)}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required (see .env.example)}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
    volumes:
      - resend-rapper-data:/data
    restart: unless-stopped

volumes:
  resend-rapper-data:
